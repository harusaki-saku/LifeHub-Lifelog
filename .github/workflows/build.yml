name: Build Lifelog (unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (unsigned, for any iOS device)
        working-directory: Lifelog.swiftpm
        run: |
          xcodebuild build \
            -scheme Lifelog \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package as .ipa (for AltStore/SideStore)
        run: |
          set -euo pipefail
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "Lifelog.app" -path "*Release-iphoneos*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Lifelog.app not found under DerivedData"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Lifelog.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lifelog-unsigned-ipa
          path: Lifelog.ipa
          retention-days: 14
